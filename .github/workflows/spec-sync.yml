name: Spec Sync

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  spec-check:
    name: Spec Validation
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: CorvidLabs/spec-sync@v3.8.0
        with:
          strict: 'true'
          comment: 'true'
