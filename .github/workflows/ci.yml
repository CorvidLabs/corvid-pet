name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "corvid-pet"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

      - name: Build (default features)
        run: cargo build

      - name: Build (all features)
        run: cargo build --all-features

      - name: Tests
        run: cargo test --all-features

      - name: Build examples
        run: cargo build --examples --all-features

  spec-check:
    name: Spec Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      report: ${{ steps.report.outputs.report }}
    steps:
      - uses: actions/checkout@v4
      - uses: CorvidLabs/spec-sync@v4.1.2
        with:
          strict: 'true'
          comment: 'false'
      - name: Capture spec-sync report
        id: report
        if: always()
        run: |
          REPORT=$(specsync comment --strict 2>/dev/null) || REPORT=""
          {
            echo "report<<SPECSYNC_EOF"
            echo "$REPORT"
            echo "SPECSYNC_EOF"
          } >> "$GITHUB_OUTPUT"

  corvid-pet:
    name: Corvid Pet
    runs-on: ubuntu-latest
    needs: [check, spec-check]
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "corvid-pet"

      - name: Build corvid-pet CLI
        run: cargo build --features cli

      - name: Restore pet health state
        uses: actions/cache/restore@v4
        with:
          path: .corvid-pet.json
          key: corvid-pet-health-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            corvid-pet-health-${{ github.repository }}-

      # ── Check Registry ──────────────────────────────────────────────
      # To add a new check to the review:
      #   1. Add a job above with outputs: status (result) and optionally report
      #   2. Add the job name to `needs:` on this corvid-pet job
      #   3. Add one CHECK_* env var below: CHECK_<name>=<label>=<result>
      #   4. Optionally add REPORT_<name> for expandable details
      # That's it — the summary table and overall status build automatically.
      # ─────────────────────────────────────────────────────────────────
      - name: Determine combined status
        id: status
        env:
          # ── Register checks here (one line each) ──
          CHECK_CI: "CI (fmt, clippy, build, test)=${{ needs.check.result }}"
          CHECK_SPEC: "Spec Validation=${{ needs.spec-check.result }}"
          # CHECK_SECURITY: "Security Audit=${{ needs.security.result }}"
          # CHECK_COVERAGE: "Test Coverage=${{ needs.coverage.result }}"

          # ── Register detail reports here (optional, matched by name) ──
          REPORT_SPEC: ${{ needs.spec-check.outputs.report }}
          # REPORT_SECURITY: ${{ needs.security.outputs.report }}
        run: |
          OVERALL="success"
          TABLE="| Check | Status |\n|-------|--------|\n"
          DETAILS=""

          # Iterate over all CHECK_* env vars
          while IFS= read -r line; do
            VAR_NAME="${line%%=*}"
            VAR_VALUE="${!VAR_NAME}"
            LABEL="${VAR_VALUE%%=*}"
            RESULT="${VAR_VALUE##*=}"

            # Status icon
            if [ "$RESULT" = "success" ]; then
              ICON="✅ Passed"
            else
              ICON="❌ ${RESULT}"
              OVERALL="failure"
            fi
            TABLE+="| **${LABEL}** | ${ICON} |\n"

            # Check for matching REPORT_* var
            SUFFIX="${VAR_NAME#CHECK_}"
            REPORT_VAR="REPORT_${SUFFIX}"
            REPORT_VALUE="${!REPORT_VAR}"
            if [ -n "$REPORT_VALUE" ]; then
              DETAILS+="\n<details>\n<summary>📋 ${LABEL} Details</summary>\n\n${REPORT_VALUE}\n\n</details>\n"
            fi
          done < <(env | grep '^CHECK_' | sort)

          echo "result=${OVERALL}" >> "$GITHUB_OUTPUT"

          {
            echo "context<<CONTEXT_EOF"
            echo "### CI Summary"
            echo ""
            echo -e "$TABLE"
            if [ -n "$DETAILS" ]; then
              echo -e "$DETAILS"
            fi
            echo "CONTEXT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run corvid-pet
        uses: ./
        with:
          mode: pr-comment
          event: auto
          pet-name: Corvin
          review-on-pr: "true"
          context: ${{ steps.status.outputs.context }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          CORVID_PET_BIN: ./target/debug/corvid-pet
          CORVID_JOB_STATUS: ${{ steps.status.outputs.result }}

      - name: Save pet health state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .corvid-pet.json
          key: corvid-pet-health-${{ github.repository }}-${{ github.run_id }}
