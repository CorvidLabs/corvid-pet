name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "corvid-pet"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

      - name: Build (default features)
        run: cargo build

      - name: Build (all features)
        run: cargo build --all-features

      - name: Tests
        run: cargo test --all-features

      - name: Build examples
        run: cargo build --examples --all-features

  spec-check:
    name: Spec Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      report: ${{ steps.report.outputs.report }}
    steps:
      - uses: actions/checkout@v4
      - uses: CorvidLabs/spec-sync@v4.1.2
        with:
          strict: 'true'
          comment: 'false'
      - name: Capture spec-sync report
        id: report
        if: always()
        run: |
          REPORT=$(specsync comment --strict 2>/dev/null) || REPORT=""
          {
            echo "report<<SPECSYNC_EOF"
            echo "$REPORT"
            echo "SPECSYNC_EOF"
          } >> "$GITHUB_OUTPUT"

  corvid-pet:
    name: Corvid Pet
    runs-on: ubuntu-latest
    needs: [check, spec-check]
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "corvid-pet"

      - name: Build corvid-pet CLI
        run: cargo build --features cli

      - name: Restore pet health state
        uses: actions/cache@v4
        with:
          path: .corvid-pet.json
          key: corvid-pet-health-${{ github.repository }}

      - name: Determine combined status
        id: status
        env:
          SPEC_REPORT: ${{ needs.spec-check.outputs.report }}
        run: |
          CI_RESULT="${{ needs.check.result }}"
          SPEC_RESULT="${{ needs.spec-check.result }}"

          # Status icons
          if [ "$CI_RESULT" = "success" ]; then CI_ICON="✅ Passed"; else CI_ICON="❌ ${CI_RESULT}"; fi
          if [ "$SPEC_RESULT" = "success" ]; then SPEC_ICON="✅ Passed"; else SPEC_ICON="❌ ${SPEC_RESULT}"; fi

          # Overall result
          if [ "$CI_RESULT" = "success" ] && [ "$SPEC_RESULT" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

          # Build multi-line context with summary table + raw report
          {
            echo "context<<CONTEXT_EOF"
            echo "### CI Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| **CI** (fmt, clippy, build, test) | ${CI_ICON} |"
            echo "| **Spec Validation** | ${SPEC_ICON} |"
            if [ -n "$SPEC_REPORT" ]; then
              echo ""
              echo "<details>"
              echo "<summary>📋 Spec Validation Details</summary>"
              echo ""
              echo "$SPEC_REPORT"
              echo ""
              echo "</details>"
            fi
            echo "CONTEXT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run corvid-pet
        uses: ./
        with:
          mode: pr-comment
          event: auto
          pet-name: Corvin
          review-on-pr: "true"
          context: ${{ steps.status.outputs.context }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          CORVID_PET_BIN: ./target/debug/corvid-pet
          CORVID_JOB_STATUS: ${{ steps.status.outputs.result }}
