name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "corvid-pet"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

      - name: Build (default features)
        run: cargo build

      - name: Build (all features)
        run: cargo build --all-features

      - name: Tests
        run: cargo test --all-features

      - name: Build examples
        run: cargo build --examples --all-features

  spec-check:
    name: Spec Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: CorvidLabs/spec-sync@v4.1.2
        with:
          strict: 'true'
          comment: 'false'

  corvid-pet:
    name: Corvid Pet
    runs-on: ubuntu-latest
    needs: [check, spec-check]
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "corvid-pet"

      - name: Build corvid-pet CLI
        run: cargo build --features cli

      - name: Determine combined status
        id: status
        run: |
          # Build context with all job results
          CONTEXT=""
          if [ "${{ needs.spec-check.result }}" = "success" ]; then
            CONTEXT="Spec validation: passed"
          else
            CONTEXT="Spec validation: ${{ needs.spec-check.result }}"
          fi
          if [ "${{ needs.check.result }}" = "success" ]; then
            CONTEXT="${CONTEXT}. CI (fmt, clippy, build, test): passed"
          else
            CONTEXT="${CONTEXT}. CI (fmt, clippy, build, test): ${{ needs.check.result }}"
          fi

          if [ "${{ needs.check.result }}" = "success" ] && [ "${{ needs.spec-check.result }}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
          echo "context=$CONTEXT" >> "$GITHUB_OUTPUT"

      - name: Run corvid-pet
        uses: ./
        with:
          mode: pr-comment
          event: auto
          pet-name: Corvin
          review-on-pr: "true"
          context: ${{ steps.status.outputs.context }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          CORVID_PET_BIN: ./target/debug/corvid-pet
          CORVID_JOB_STATUS: ${{ steps.status.outputs.result }}
