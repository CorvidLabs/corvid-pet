name: "corvid-pet"
description: "ASCII corvid companion that tracks your repo's health and reacts to CI/CD events"
author: "CorvidLabs"

branding:
  icon: "heart"
  color: "purple"

inputs:
  mode:
    description: "Action mode: pr-comment, health-check, greet, release, badge"
    required: true
    default: "pr-comment"
  event:
    description: "Event type: auto (detect from job status), success, failure, warning, progress, idle"
    required: false
    default: "auto"
  pet-name:
    description: "Name for your corvid companion"
    required: false
    default: "Corvin"
  state-file:
    description: "Path to the health state JSON file"
    required: false
    default: ".corvid-pet.json"
  context:
    description: "Additional context for comments (e.g. CI summary)"
    required: false
    default: ""
  comment-on-pr:
    description: "Whether to post a comment on the PR (requires GITHUB_TOKEN)"
    required: false
    default: "true"
  review-on-pr:
    description: "Submit the pet comment as a PR review (APPROVE/REQUEST_CHANGES) instead of a plain comment"
    required: false
    default: "false"
  update-readme:
    description: "Whether to update the README badge (for badge mode)"
    required: false
    default: "false"
  job-status:
    description: "Override job status for event auto-detection (e.g. from a combined check result). Falls back to job.status."
    required: false
    default: ""
  github-token:
    description: "GitHub token for posting comments"
    required: false
    default: ${{ github.token }}

outputs:
  mood:
    description: "The pet's current mood"
    value: ${{ steps.run.outputs.mood }}
  score:
    description: "The repo health score (0-100)"
    value: ${{ steps.run.outputs.score }}
  comment:
    description: "The generated comment markdown"
    value: ${{ steps.run.outputs.comment }}
  art:
    description: "The ASCII art output"
    value: ${{ steps.run.outputs.art }}
  event:
    description: "The resolved event type (success, failure, warning, progress, idle)"
    value: ${{ steps.run.outputs.event }}

runs:
  using: "composite"
  steps:
    - name: Download pre-built binary
      if: ${{ !env.CORVID_PET_BIN }}
      id: download-bin
      shell: bash
      continue-on-error: true
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   TARGET="x86_64-unknown-linux-gnu" ;;
          Linux-ARM64)  TARGET="aarch64-unknown-linux-gnu" ;;
          macOS-X64)    TARGET="x86_64-apple-darwin" ;;
          macOS-ARM64)  TARGET="aarch64-apple-darwin" ;;
          *)            echo "Unsupported platform"; exit 1 ;;
        esac
        URL="https://github.com/CorvidLabs/corvid-pet/releases/latest/download/corvid-pet-${TARGET}.tar.gz"
        echo "Downloading $URL"
        curl -fsSL "$URL" | tar xz -C /usr/local/bin 2>/dev/null || \
        (mkdir -p ~/.cargo/bin && curl -fsSL "$URL" | tar xz -C ~/.cargo/bin)
        echo "downloaded=true" >> "$GITHUB_OUTPUT"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      if: ${{ !env.CORVID_PET_BIN && steps.download-bin.outcome != 'success' }}

    - name: Cache corvid-pet binary
      if: ${{ !env.CORVID_PET_BIN && steps.download-bin.outcome != 'success' }}
      uses: actions/cache@v4
      id: cache-bin
      with:
        path: ~/.cargo/bin/corvid-pet
        key: corvid-pet-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}

    - name: Install corvid-pet CLI (fallback)
      if: ${{ !env.CORVID_PET_BIN && steps.download-bin.outcome != 'success' && steps.cache-bin.outputs.cache-hit != 'true' }}
      shell: bash
      run: cargo install corvid-pet --features cli

    - name: Run corvid-pet
      id: run
      shell: bash
      env:
        CORVID_MODE: ${{ inputs.mode }}
        CORVID_EVENT: ${{ inputs.event }}
        CORVID_NAME: ${{ inputs.pet-name }}
        CORVID_STATE: ${{ inputs.state-file }}
        CORVID_CONTEXT: ${{ inputs.context }}
        CORVID_JOB_STATUS: ${{ inputs.job-status || job.status }}
      run: |
        BIN="${CORVID_PET_BIN:-corvid-pet}"

        # Auto-detect event from job status if set to "auto"
        if [ "$CORVID_EVENT" = "auto" ]; then
          JOB_STATUS_LOWER=$(echo "$CORVID_JOB_STATUS" | tr '[:upper:]' '[:lower:]')
          case "$JOB_STATUS_LOWER" in
            success)  CORVID_EVENT="success" ;;
            failure)  CORVID_EVENT="failure" ;;
            cancelled) CORVID_EVENT="warning" ;;
            *)        CORVID_EVENT="progress" ;;
          esac
        fi

        echo "event=$CORVID_EVENT" >> "$GITHUB_OUTPUT"

        case "$CORVID_MODE" in
          pr-comment)
            # Record the event
            $BIN react "$CORVID_EVENT" --state "$CORVID_STATE" --name "$CORVID_NAME" ${CORVID_CONTEXT:+--context "$CORVID_CONTEXT"} --no-color

            # Generate PR comment
            COMMENT=$($BIN comment "$CORVID_EVENT" --state "$CORVID_STATE" --name "$CORVID_NAME" --context "$CORVID_CONTEXT")
            echo "comment<<CORVID_EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMENT" >> "$GITHUB_OUTPUT"
            echo "CORVID_EOF" >> "$GITHUB_OUTPUT"
            ;;

          health-check)
            $BIN react "$CORVID_EVENT" --state "$CORVID_STATE" --name "$CORVID_NAME" ${CORVID_CONTEXT:+--context "$CORVID_CONTEXT"} --no-color
            HEALTH_JSON=$($BIN health --state "$CORVID_STATE" --name "$CORVID_NAME" --json)
            echo "health=$HEALTH_JSON" >> "$GITHUB_OUTPUT"
            ;;

          greet)
            COMMENT=$($BIN comment success --state "$CORVID_STATE" --name "$CORVID_NAME" --context "Welcome! Thanks for contributing. 🐦")
            echo "comment<<CORVID_EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMENT" >> "$GITHUB_OUTPUT"
            echo "CORVID_EOF" >> "$GITHUB_OUTPUT"
            ;;

          release)
            COMMENT=$($BIN comment success --state "$CORVID_STATE" --name "$CORVID_NAME" --context "🎉 New release! $CORVID_CONTEXT")
            echo "comment<<CORVID_EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMENT" >> "$GITHUB_OUTPUT"
            echo "CORVID_EOF" >> "$GITHUB_OUTPUT"
            ;;

          badge)
            BADGE=$($BIN badge --state "$CORVID_STATE" --name "$CORVID_NAME")
            echo "badge<<CORVID_EOF" >> "$GITHUB_OUTPUT"
            echo "$BADGE" >> "$GITHUB_OUTPUT"
            echo "CORVID_EOF" >> "$GITHUB_OUTPUT"
            ;;
        esac

        # Extract mood and score for outputs
        HEALTH_JSON=$($BIN health --state "$CORVID_STATE" --name "$CORVID_NAME" --json 2>/dev/null || echo '{}')
        MOOD=$(echo "$HEALTH_JSON" | grep -o '"mood":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "neutral")
        SCORE=$(echo "$HEALTH_JSON" | grep -o '"score":[0-9.]*' | head -1 | cut -d: -f2 || echo "100")
        echo "mood=$MOOD" >> "$GITHUB_OUTPUT"
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"

        # Show art
        ART=$($BIN show --no-color --name "$CORVID_NAME")
        echo "art<<CORVID_EOF" >> "$GITHUB_OUTPUT"
        echo "$ART" >> "$GITHUB_OUTPUT"
        echo "CORVID_EOF" >> "$GITHUB_OUTPUT"

    - name: Post PR comment or review
      if: (inputs.comment-on-pr == 'true' || inputs.review-on-pr == 'true') && (inputs.mode == 'pr-comment' || inputs.mode == 'greet') && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        CORVID_COMMENT: ${{ steps.run.outputs.comment }}
        CORVID_EVENT: ${{ steps.run.outputs.event }}
        CORVID_REVIEW: ${{ inputs.review-on-pr }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const comment = process.env.CORVID_COMMENT;
          if (!comment) return;

          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const pull_number = context.issue.number;
          const useReview = process.env.CORVID_REVIEW === 'true';

          if (useReview) {
            // Dismiss any previous corvid-pet review so we don't pile up
            const { data: reviews } = await github.rest.pulls.listReviews({ owner, repo, pull_number });
            for (const r of reviews) {
              if (r.user?.login === 'github-actions[bot]' && r.body?.includes('<!-- corvid-pet-report -->')) {
                try {
                  await github.rest.pulls.dismissReview({
                    owner, repo, pull_number,
                    review_id: r.id,
                    message: 'Superseded by updated review.',
                  });
                } catch { /* may fail if already dismissed */ }
              }
            }

            // Submit the pet comment as a PR review
            const event = process.env.CORVID_EVENT === 'success' ? 'APPROVE' : 'REQUEST_CHANGES';
            await github.rest.pulls.createReview({ owner, repo, pull_number, body: comment, event });
          } else {
            // Plain issue comment (original behavior)
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pull_number,
            });
            const existing = comments.find(c => c.body && c.body.includes('<!-- corvid-pet-report -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: comment });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body: comment });
            }
          }

    - name: Update README badge
      if: inputs.update-readme == 'true' && inputs.mode == 'badge'
      shell: bash
      run: |
        BADGE=$(${{ env.CORVID_PET_BIN || 'corvid-pet' }} badge --state "${{ inputs.state-file }}" --name "${{ inputs.pet-name }}")
        if grep -q "corvid-pet:start" README.md 2>/dev/null; then
          # Replace existing badge section
          sed -i.bak '/<!-- corvid-pet:start -->/,/<!-- corvid-pet:end -->/c\'"$BADGE" README.md
          rm -f README.md.bak
        else
          # Append badge section
          echo "" >> README.md
          echo "$BADGE" >> README.md
        fi

